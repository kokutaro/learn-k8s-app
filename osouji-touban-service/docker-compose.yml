services:
  webapi:
    build:
      context: .
      dockerfile: src/OsoujiSystem.WebApi/Dockerfile
    container_name: osouji-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      INFRASTRUCTURE__PERSISTENCEMODE: EventStore
      INFRASTRUCTURE__POSTGRES__CONNECTIONSTRING: Host=postgres;Port=5432;Database=osouji;Username=osouji;Password=osouji
      INFRASTRUCTURE__REDIS__CONNECTIONSTRING: redis:6379
      INFRASTRUCTURE__RABBITMQ__HOST: rabbitmq
      INFRASTRUCTURE__RABBITMQ__PORT: 5672
      INFRASTRUCTURE__RABBITMQ__VIRTUALHOST: /
      INFRASTRUCTURE__RABBITMQ__USERNAME: osouji
      INFRASTRUCTURE__RABBITMQ__PASSWORD: osouji
      INFRASTRUCTURE__RABBITMQ__USETLS: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: osouji-postgres
    environment:
      POSTGRES_DB: osouji
      POSTGRES_USER: osouji
      POSTGRES_PASSWORD: osouji
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osouji -d osouji"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: osouji-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: osouji-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: osouji
      RABBITMQ_DEFAULT_PASS: osouji
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: osouji-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: osouji-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "18889:8889"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: osouji-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/prometheus-alert-rules-draft-v1.yaml:/etc/prometheus/rules/osouji-alert-rules.yaml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - webapi

  grafana:
    image: grafana/grafana:12.0.2
    container_name: osouji-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
