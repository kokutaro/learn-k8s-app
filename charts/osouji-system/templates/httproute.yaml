apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "osouji-system.fullname" . }}-route
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - matches: 
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: {{ include "osouji-system.fullname" . }}-backend
          port: 8080
    - matches: 
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "osouji-system.fullname" . }}-frontend
          port: 80