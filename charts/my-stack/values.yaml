replicaCount: 1

hostname: my-stack.local

frontend:
  image:
    repository: ghcr.io/user/frontend
    tag: latest
  service:
    type: ClusterIP
    port: 80
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
backend:
  image:
    repository: ghcr.io/user/backend
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 1500m
      memory: 256Mi
    requests:
      cpu: 1000m
      memory: 128Mi
postgresql:
  enabled: true
  auth:
    database: myapp
    username: user
    existingSecret: postgres-auth-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
