name: Build and Update Manifest
# This workflow builds and pushes backend and frontend images to GHCR on pull requests.
# It only builds the images that have changes in the PR, and reuses the existing images for unchanged ones by retagging them from the base SHA to the head SHA.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

jobs:
  remove-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview link comment from pull request
        uses: actions/github-script@v8
        env:
          MARKER: "<!-- preview-environment-link -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping comment removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
                console.log(`Deleted comment ${comment.id} containing marker.`);
              }
            };
      - name: Remove preview label from pull request
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping label removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: prNumber,
              name: 'preview-ready',
            }).catch((error) => {
              if (error.status === 404) {
                console.log('Label not found on the pull request, skipping label removal.');
              } else {
                throw error;
              }
            });
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Detect changed apps
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - "osouji-touban-service/src/**"
              - "osouji-touban-service/Dockerfile"
              - "osouji-touban-service/OsoujiSystem.slnx"
              - "osouji-touban-service/Directory.Build.props"
            frontend:
              - "osouji-touban-service/osouji-system-frontend/**"

  test-backend:
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore osouji-touban-service/OsoujiSystem.slnx

      - name: Build solution
        run: dotnet build osouji-touban-service/OsoujiSystem.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test osouji-touban-service/OsoujiSystem.slnx --no-build --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=opencover || true

  build-backend:
    needs: [test-backend, changes]
    if: ${{ needs.test-backend.result == 'success' && needs.changes.outputs.backend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PLATFORM_PAIR: ""
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend by digest
        id: backend-build
        uses: docker/build-push-action@v7
        with:
          context: ./osouji-touban-service
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export backend digest
        run: |
          mkdir -p "${{ runner.temp }}/digests-backend"
          digest="${{ steps.backend-build.outputs.digest }}"
          touch "${{ runner.temp }}/digests-backend/${digest#sha256:}"

      - name: Upload backend digest
        uses: actions/upload-artifact@v7
        with:
          name: backend-digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests-backend/*
          if-no-files-found: error
          retention-days: 1

  merge-backend:
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: ${{ always() && needs.build-backend.result == 'success' }}
    steps:
      - name: Download backend digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests-backend
          pattern: backend-digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create backend manifest and push
        working-directory: ${{ runner.temp }}/digests-backend
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          TAG=${{ github.event.pull_request.head.sha }}
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect backend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-backend:${{ github.event.pull_request.head.sha }}

  retag-backend-if-unchanged:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.backend != 'true' }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Retag backend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          SRC_TAG=latest
          DST_TAG=${{ github.event.pull_request.head.sha }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"

      - name: Inspect retagged backend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-backend:${{ github.event.pull_request.head.sha }}
  test-frontend:
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Install dependencies and run tests
        working-directory: ./osouji-touban-service/osouji-system-frontend
        run: |
          npm ci
          npm run lint
          npm run build
          npm test
          npm run e2e
  build-frontend:
    needs: [changes, test-frontend]
    if: ${{ needs.test-frontend.result == 'success' && needs.changes.outputs.frontend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PLATFORM_PAIR: ""
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend by digest
        id: frontend-build
        uses: docker/build-push-action@v7
        with:
          context: ./osouji-touban-service/osouji-system-frontend
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export frontend digest
        run: |
          mkdir -p "${{ runner.temp }}/digests-frontend"
          digest="${{ steps.frontend-build.outputs.digest }}"
          touch "${{ runner.temp }}/digests-frontend/${digest#sha256:}"

      - name: Upload frontend digest
        uses: actions/upload-artifact@v7
        with:
          name: frontend-digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests-frontend/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: ${{ always() && needs.build-frontend.result == 'success' }}
    steps:
      - name: Download frontend digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests-frontend
          pattern: frontend-digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create frontend manifest and push
        working-directory: ${{ runner.temp }}/digests-frontend
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          TAG=${{ github.event.pull_request.head.sha }}
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect frontend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-frontend:${{ github.event.pull_request.head.sha }}

  retag-frontend-if-unchanged:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend != 'true' }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Retag frontend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          SRC_TAG=latest
          DST_TAG=${{ github.event.pull_request.head.sha }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"
      - name: Inspect retagged frontend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-frontend:${{ github.event.pull_request.head.sha }}

  add-preview-ready-label:
    runs-on: ubuntu-latest
    needs:
      - merge-backend
      - merge-frontend
      - retag-backend-if-unchanged
      - retag-frontend-if-unchanged
    if: ${{ always() && (needs.merge-backend.result == 'success' || needs.retag-backend-if-unchanged.result == 'success') && (needs.merge-frontend.result == 'success' || needs.retag-frontend-if-unchanged.result == 'success') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Add "preview-ready" label to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "preview-ready"

  trigger-argocd-preview:
    runs-on: ubuntu-latest
    needs: [add-preview-ready-label]
    if: ${{ always() && needs.add-preview-ready-label.result == 'success' }}
    steps:
      - name: Login to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
      - name: Trigger ApplicationSet webhook
        env:
          APPSET_WEBHOOK_URL: ${{ secrets.ARGOCD_APPSET_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          PAYLOAD=$(jq -n \
            --arg action "labeled" \
            --argjson number "$PR_NUMBER" \
            --arg head_sha "$HEAD_SHA" \
            --arg head_ref "$HEAD_REF" \
            --arg base_ref "$BASE_REF" \
            '{
              action: $action,
              number: $number,
              label: { name: "preview-ready" },
              repository: {
                name: "learn-k8s-app",
                full_name: "kokutaro/learn-k8s-app",
                url: "https://api.github.com/repos/kokutaro/learn-k8s-app",
                html_url: "https://github.com/kokutaro/learn-k8s-app",
                owner: { login: "kokutaro" }
              },
              pull_request: {
                number: $number,
                state: "open",
                html_url: ("https://github.com/kokutaro/learn-k8s-app/pull/" + ($number | tostring)),
                base: {
                  ref: $base_ref,
                  repo: {
                    name: "learn-k8s-app",
                    full_name: "kokutaro/learn-k8s-app",
                    owner: { login: "kokutaro" }
                  }
                },
                head: {
                  ref: $head_ref,
                  sha: $head_sha,
                  repo: {
                    name: "learn-k8s-app",
                    full_name: "kokutaro/learn-k8s-app",
                    owner: { login: "kokutaro" }
                  }
                },
                labels: [{ name: "preview-ready" }]
              }
            }')

          curl --fail --retry 3 --retry-delay 5 --max-time 15 \
            -X POST "${APPSET_WEBHOOK_URL}/api/webhook" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -d "$PAYLOAD"
