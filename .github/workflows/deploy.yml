name: Build and Update Manifest
# This workflow builds and pushes backend and frontend images to GHCR on pull requests.
# It only builds the images that have changes in the PR, and reuses the existing images for unchanged ones by retagging them from the base SHA to the head SHA.
# After image preparation, it directly notifies ArgoCD webhook via Tailscale instead of label-based polling.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

jobs:
  remove-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview link comment from pull request
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- preview-environment-link -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping comment removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
                console.log(`Deleted comment ${comment.id} containing marker.`);
              }
            };
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Detect changed apps
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "osouji-touban-service/**"
              - "!osouji-touban-service/osouji-system-frontend/**"
            frontend:
              - "osouji-touban-service/osouji-system-frontend/**"

  build-backend:
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PLATFORM_PAIR: ""
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend by digest
        id: backend-build
        uses: docker/build-push-action@v6
        with:
          context: ./osouji-touban-service
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export backend digest
        run: |
          mkdir -p "${{ runner.temp }}/digests-backend"
          digest="${{ steps.backend-build.outputs.digest }}"
          touch "${{ runner.temp }}/digests-backend/${digest#sha256:}"

      - name: Upload backend digest
        uses: actions/upload-artifact@v4
        with:
          name: backend-digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests-backend/*
          if-no-files-found: error
          retention-days: 1

  merge-backend:
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: ${{ always() && needs.build-backend.result == 'success' }}
    steps:
      - name: Download backend digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests-backend
          pattern: backend-digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create backend manifest and push
        working-directory: ${{ runner.temp }}/digests-backend
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          TAG=${{ github.event.pull_request.head.sha }}
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect backend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-backend:${{ github.event.pull_request.head.sha }}

  retag-backend-if-unchanged:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.backend != 'true' }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag backend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          SRC_TAG=latest
          DST_TAG=${{ github.event.pull_request.head.sha }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"

      - name: Inspect retagged backend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-backend:${{ github.event.pull_request.head.sha }}

  build-frontend:
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      PLATFORM_PAIR: ""
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend by digest
        id: frontend-build
        uses: docker/build-push-action@v6
        with:
          context: ./osouji-touban-service/osouji-system-frontend
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export frontend digest
        run: |
          mkdir -p "${{ runner.temp }}/digests-frontend"
          digest="${{ steps.frontend-build.outputs.digest }}"
          touch "${{ runner.temp }}/digests-frontend/${digest#sha256:}"

      - name: Upload frontend digest
        uses: actions/upload-artifact@v4
        with:
          name: frontend-digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests-frontend/*
          if-no-files-found: error
          retention-days: 1

  merge-frontend:
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: ${{ always() && needs.build-frontend.result == 'success' }}
    steps:
      - name: Download frontend digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests-frontend
          pattern: frontend-digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create frontend manifest and push
        working-directory: ${{ runner.temp }}/digests-frontend
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          TAG=${{ github.event.pull_request.head.sha }}
          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect frontend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-frontend:${{ github.event.pull_request.head.sha }}

  retag-frontend-if-unchanged:
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend != 'true' }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag frontend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          SRC_TAG=latest
          DST_TAG=${{ github.event.pull_request.head.sha }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"
      - name: Inspect retagged frontend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-frontend:${{ github.event.pull_request.head.sha }}

  notify-argocd-preview:
    runs-on: ubuntu-latest
    needs:
      - merge-backend
      - merge-frontend
      - retag-backend-if-unchanged
      - retag-frontend-if-unchanged
    if: ${{ always() && (needs.merge-backend.result == 'success' || needs.retag-backend-if-unchanged.result == 'success') && (needs.merge-frontend.result == 'success' || needs.retag-frontend-if-unchanged.result == 'success') }}
    steps:
      - name: Login to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Notify ArgoCD preview webhook
        env:
          ARGOCD_PREVIEW_WEBHOOK_URL: ${{ secrets.ARGOCD_PREVIEW_WEBHOOK_URL }}
          ARGOCD_PREVIEW_WEBHOOK_SECRET: ${{ secrets.ARGOCD_PREVIEW_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          if [[ -z "${ARGOCD_PREVIEW_WEBHOOK_URL}" ]]; then
            echo "Missing required secret: ARGOCD_PREVIEW_WEBHOOK_URL"
            exit 1
          fi

          event_payload=$(cat "$GITHUB_EVENT_PATH")
          event_name="${GITHUB_EVENT_NAME}"
          delivery_id="$(uuidgen)"

          header_args=(
            -H "Content-Type: application/json"
            -H "X-GitHub-Event: ${event_name}"
            -H "X-GitHub-Delivery: ${delivery_id}"
            -H "User-Agent: GitHub-Hookshot/preview-trigger"
          )

          # If ArgoCD webhook secret is configured, provide both legacy and v2 signatures.
          if [[ -n "${ARGOCD_PREVIEW_WEBHOOK_SECRET:-}" ]]; then
            signature_v1=$(printf '%s' "$event_payload" | openssl dgst -sha1 -hmac "$ARGOCD_PREVIEW_WEBHOOK_SECRET" | sed 's/^.* //')
            signature_v2=$(printf '%s' "$event_payload" | openssl dgst -sha256 -hmac "$ARGOCD_PREVIEW_WEBHOOK_SECRET" | sed 's/^.* //')
            header_args+=(
              -H "X-Hub-Signature: sha1=${signature_v1}"
              -H "X-Hub-Signature-256: sha256=${signature_v2}"
            )
          fi

          response_body_file="$(mktemp)"
          http_status=$(curl \
            --show-error \
            --silent \
            --retry 3 \
            --retry-delay 2 \
            --max-time 20 \
            -X POST "$ARGOCD_PREVIEW_WEBHOOK_URL" \
            "${header_args[@]}" \
            --data "$event_payload" \
            --output "$response_body_file" \
            --write-out "%{http_code}")

          if [[ "$http_status" -lt 200 || "$http_status" -ge 300 ]]; then
            echo "ArgoCD webhook call failed: HTTP $http_status"
            echo "Response body:"
            cat "$response_body_file"
            exit 1
          fi

          echo "ArgoCD webhook call succeeded: HTTP $http_status"
