name: Production Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows:
      - "Release On PR Merge"
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  resolve-tag:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Resolve tag name
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            tag_name="$PUSH_TAG"
          else
            releases_json=$(gh api --paginate "repos/$REPO/releases?per_page=100" | jq -s 'add')

            tag_name=$(printf '%s' "$releases_json" | jq -r '.[] | .tag_name' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

            if [[ -z "$tag_name" ]]; then
              echo "No stable release tag found for workflow_run trigger"
              exit 1
            fi
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

  validate-tag:
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.pass.outputs.tag_name }}
    steps:
      - name: Validate release tag format
        run: |
          if [[ ! "${{ needs.resolve-tag.outputs.tag_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${{ needs.resolve-tag.outputs.tag_name }}"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi
      - name: Pass tag output
        id: pass
        run: |
          echo "tag_name=${{ needs.resolve-tag.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
  retag-frontend:
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag frontend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-frontend
          SRC_TAG=latest
          DST_TAG=${{ needs.validate-tag.outputs.tag_name }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"
      - name: Inspect retagged frontend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-frontend:${{ needs.validate-tag.outputs.tag_name }}
  retag-backend:
    needs: [validate-tag]
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag backend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/osouji-system-backend
          SRC_TAG=latest
          DST_TAG=${{ needs.validate-tag.outputs.tag_name }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"
      - name: Inspect retagged backend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/osouji-system-backend:${{ needs.validate-tag.outputs.tag_name }}
  update-infra-repo:
    runs-on: ubuntu-latest
    needs: [validate-tag, retag-frontend, retag-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Update Image Tag in Infra Repository
        run: |
          git clone https://${{ secrets.INFRA_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/${{ vars.INFRA_REPO_NAME }}.git
          cd ${{ vars.INFRA_REPO_NAME }}

          NEW_TAGS=${{ needs.validate-tag.outputs.tag_name }}
          sed -i "s/tag: .*/tag: ${NEW_TAGS}/g" argocd/apps/production/values-prod.yaml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/apps/production/values-prod.yaml
          git commit -m "Update image tag to ${NEW_TAGS}"
          git push origin main
  trigger-argocd-sync:
    runs-on: ubuntu-latest
    needs: [update-infra-repo]
    steps:
      - name: Login to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
      - name: Trigger ArgoCD webhook for infra repo update
        env:
          ARGOCD_WEBHOOK_URL: ${{ secrets.ARGOCD_SERVER_WEBHOOK_URL }}
          REPO_OWNER: ${{ github.repository_owner }}
          INFRA_REPO: ${{ vars.INFRA_REPO_NAME }}
        run: |
          PAYLOAD=$(jq -n \
            --arg owner "$REPO_OWNER" \
            --arg repo "$INFRA_REPO" \
            '{
              ref: "refs/heads/main",
              repository: {
                name: $repo,
                full_name: ($owner + "/" + $repo),
                html_url: ("https://github.com/" + $owner + "/" + $repo),
                default_branch: "main",
                owner: { login: $owner, name: $owner }
              },
              pusher: { name: "github-actions[bot]" },
              sender: { login: "github-actions[bot]" }
            }')

          curl --fail --retry 3 --retry-delay 5 --max-time 15 \
            -X POST "${ARGOCD_WEBHOOK_URL}/api/webhook" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "$PAYLOAD"

  send-deploy-marker:
    runs-on: ubuntu-latest
    needs: [validate-tag, trigger-argocd-sync]
    steps:
      - name: Login to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
      - name: Create Grafana Annotation
        run: |
          # 現在の時刻をミリ秒で取得
          NOW=$(date +%s000)

          curl -X POST "${{ secrets.GRAFANA_URL }}/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚀 Production Deploy: ${{ needs.validate-tag.outputs.tag_name }}",
              "tags": ["deploy", "production", "app-repo"],
              "time": '$NOW',
              "timeEnd": '$NOW'
            }'
