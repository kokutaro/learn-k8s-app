name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  remove-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview link comment from pull request
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- preview-environment-link -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping comment removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
                console.log(`Deleted comment ${comment.id} containing marker.`);
              }
            });
      - name: Remove preview label from pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping label removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: prNumber,
              name: 'preview-ready',
            }).catch((error) => {
              if (error.status === 404) {
                console.log('Label not found on the pull request, skipping label removal.');
              } else {
                throw error;
              }
            });
  retag-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag frontend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/learn-k8s-frontend
          SRC_TAG=latest
          DST_TAG=${{ github.sha }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"
      - name: Inspect retagged frontend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/learn-k8s-frontend:${{ github.sha }}
  retag-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag backend image from base SHA to head SHA
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/learn-k8s-backend
          SRC_TAG=latest
          DST_TAG=${{ github.sha }}
          docker pull "${IMAGE}:${SRC_TAG}"
          docker tag "${IMAGE}:${SRC_TAG}" "${IMAGE}:${DST_TAG}"
          docker push "${IMAGE}:${DST_TAG}"
      - name: Inspect retagged backend image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/learn-k8s-backend:${{ github.sha }}
  update-infra-repo:
    runs-on: ubuntu-latest
    needs: [retag-frontend, retag-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Update Image Tag in Infra Repository
        run: |
          git clone https://${{ secrets.INFRA_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/${{ vars.INFRA_REPO_NAME }}.git
          cd ${{ vars.INFRA_REPO_NAME }}

          NEW_TAGS=${{ github.sha }}
          sed -i "s/tag: .*/tag: ${NEW_TAGS}/g" argocd/apps/production/values-prod.yaml

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/apps/production/values-prod.yaml
          git commit -m "Update image tag to ${NEW_TAGS}"
          git push origin main
  send-deploy-marker:
    runs-on: ubuntu-latest
    needs: update-infra-repo
    steps:
      - name: Login to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
      - name: Create Grafana Annotation
        run: |
          # 現在の時刻をミリ秒で取得
          NOW=$(date +%s000)

          curl -X POST "${{ secrets.GRAFANA_URL }}/api/annotations" \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚀 Production Deploy: ${{ github.sha }}",
              "tags": ["deploy", "production", "app-repo"],
              "time": '$NOW',
              "timeEnd": '$NOW'
            }'
