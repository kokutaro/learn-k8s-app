name: Preview Environment Ready

on:
  repository_dispatch:
    types: [preview_environment_ready]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  remove-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview link comment from pull request
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- preview-environment-link -->"
        with:
          script: |
            const marker = process.env.MARKER;
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping comment removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            for (const comment of comments) {
              if (comment.body && comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
                console.log(`Deleted comment ${comment.id} containing marker.`);
              }
            };
      - name: Remove preview label from pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            if (!context.payload.pull_request) {
              console.log('No pull request associated with this push, skipping label removal.');
              return;
            }

            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: prNumber,
              name: 'preview-ready',
            }).catch((error) => {
              if (error.status === 404) {
                console.log('Label not found on the pull request, skipping label removal.');
              } else {
                throw error;
              }
            });
  upsert-preview-link-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert preview link comment on pull request
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- preview-environment-link -->"
        with:
          script: |
            const payload = context.payload.client_payload || {};
            const prNumber = Number(payload.pr_number);
            const previewUrl = payload.preview_url;
            const revision = payload.revision;
            const appName = payload.app_name;

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed('Missing required client_payload.pr_number');
              return;
            }

            if (!previewUrl) {
              core.setFailed('Missing required client_payload.preview_url');
              return;
            }

            const marker = process.env.MARKER;
            const appLine = appName ? `- App: \`${appName}\`` : null;
            const revLine = revision ? `- Revision: \`${revision}\`` : null;

            const body = [
              marker,
              '### Preview environment is ready',
              '',
              `- URL: [${previewUrl}](${previewUrl})`,
              appLine,
              revLine,
            ].filter(Boolean).join('\n');

            const { owner, repo } = context.repo;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated preview link comment: ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
              core.info('Created preview link comment');
            }

      - name: Add preview-live label (optional)
        if: ${{ github.event.client_payload.pr_number != null }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.client_payload.pr_number;
            const { owner, repo } = context.repo;

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['preview-live'],
              });
              core.info('Added preview-live label');
            } catch (error) {
              // Label may not exist yet in repository settings; do not fail notification flow.
              core.warning(`Failed to add preview-live label: ${error.message}`);
            }
